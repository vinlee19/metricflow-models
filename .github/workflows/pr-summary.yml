name: PR Change Summary

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summary:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Summarize Changed Models & Views
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # 获取 PR 变更文件列表
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate \
            --jq '.[] | select(.filename | test("^(models|views)/.*\\.yml$")) | "\(.status)\t\(.filename)"' \
            > /tmp/changed_files.txt

          # 如果没有模型/视图变更，跳过
          if [ ! -s /tmp/changed_files.txt ]; then
            echo "No model/view files changed, skipping."
            exit 0
          fi

          # 分类文件
          ADDED=$(grep "^added" /tmp/changed_files.txt | cut -f2 || true)
          MODIFIED=$(grep "^modified" /tmp/changed_files.txt | cut -f2 || true)
          REMOVED=$(grep "^removed" /tmp/changed_files.txt | cut -f2 || true)

          # 统计删除数量
          REMOVED_COUNT=0
          if [ -n "$REMOVED" ]; then
            REMOVED_COUNT=$(echo "$REMOVED" | wc -l | tr -d ' ')
          fi

          # 判断版本影响 label
          VERSION_LABEL=""
          if [ "$REMOVED_COUNT" -gt 5 ]; then
            VERSION_LABEL="major-change"
          elif [ -n "$ADDED" ] || [ "$REMOVED_COUNT" -gt 0 ]; then
            VERSION_LABEL="minor-change"
          elif [ -n "$MODIFIED" ]; then
            VERSION_LABEL="patch-change"
          fi

          # 构建评论内容
          echo "## 📋 模型 & 视图变更总结 / Change Summary" > /tmp/comment.md

          if [ -n "$VERSION_LABEL" ]; then
            echo "" >> /tmp/comment.md
            echo "**版本影响 / Version Impact**: \`${VERSION_LABEL}\`" >> /tmp/comment.md
          fi

          if [ -n "$ADDED" ]; then
            echo "" >> /tmp/comment.md
            echo "### ✅ 新增 / Added" >> /tmp/comment.md
            echo "$ADDED" | while read -r f; do echo "- \`$f\`" >> /tmp/comment.md; done
          fi

          if [ -n "$MODIFIED" ]; then
            echo "" >> /tmp/comment.md
            echo "### ✏️ 修改 / Modified" >> /tmp/comment.md
            echo "$MODIFIED" | while read -r f; do echo "- \`$f\`" >> /tmp/comment.md; done
          fi

          if [ -n "$REMOVED" ]; then
            echo "" >> /tmp/comment.md
            echo "### 🗑️ 删除 / Removed (${REMOVED_COUNT} 个文件)" >> /tmp/comment.md
            echo "$REMOVED" | while read -r f; do echo "- \`$f\`" >> /tmp/comment.md; done
          fi

          # staging → master 时给出发版建议
          if [ "$PR_BASE_REF" = "master" ] && [ "$PR_HEAD_REF" = "staging" ]; then
            # 获取最新的合规 tag（vX.Y.Z 格式），跳过不规范的
            LATEST_TAG=$(gh api "repos/${GITHUB_REPOSITORY}/tags" --paginate \
              --jq '.[].name' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v0.0.0"
            fi
            # 解析版本号
            MAJOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | sed 's/^v//' | cut -d. -f3)

            if [ "$VERSION_LABEL" = "major-change" ]; then
              NEXT_VERSION="v$((MAJOR + 1)).0.0"
            elif [ "$VERSION_LABEL" = "minor-change" ]; then
              NEXT_VERSION="v${MAJOR}.$((MINOR + 1)).0"
            else
              NEXT_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi

            echo "" >> /tmp/comment.md
            echo "---" >> /tmp/comment.md
            echo "" >> /tmp/comment.md
            echo "### 🚀 发版建议 / Release Suggestion" >> /tmp/comment.md
            echo "" >> /tmp/comment.md
            echo "当前最新 Tag: \`${LATEST_TAG}\`" >> /tmp/comment.md
            echo "" >> /tmp/comment.md
            echo "**建议下一个版本号: \`${NEXT_VERSION}\`**" >> /tmp/comment.md
            echo "" >> /tmp/comment.md
            if [ "$VERSION_LABEL" = "major-change" ]; then
              echo "> ⚠️ 本次变更删除了大量模型/视图（${REMOVED_COUNT} 个文件），属于不兼容变更" >> /tmp/comment.md
              echo "> 建议递增**第一位** MAJOR 版本号（如 v1.0.0 → v2.0.0）" >> /tmp/comment.md
            elif [ "$VERSION_LABEL" = "minor-change" ]; then
              echo "> 本次变更包含新模型或视图的增减" >> /tmp/comment.md
              echo "> 建议递增**第二位** MINOR 版本号（如 v0.1.0 → v0.2.0）" >> /tmp/comment.md
            else
              echo "> 本次变更仅涉及现有模型的小幅调整" >> /tmp/comment.md
              echo "> 建议递增**第三位** PATCH 版本号（如 v0.1.0 → v0.1.1）" >> /tmp/comment.md
            fi
            echo "" >> /tmp/comment.md
            echo "### 📖 发版规范 / Release Guide" >> /tmp/comment.md
            echo "" >> /tmp/comment.md
            echo "合并本 PR 后，请前往 [Releases](https://github.com/${GITHUB_REPOSITORY}/releases/new) 创建新 Release：" >> /tmp/comment.md
            echo "" >> /tmp/comment.md
            echo "1. **Tag**: \`${NEXT_VERSION}\`（格式: \`v{MAJOR}.{MINOR}.{PATCH}\`）" >> /tmp/comment.md
            echo "2. **Target**: \`master\` 分支" >> /tmp/comment.md
            echo "3. **Title**: \`${NEXT_VERSION}\`" >> /tmp/comment.md
            echo "4. **描述**: 点击 \"Generate release notes\" 自动生成，或参考以下模板：" >> /tmp/comment.md
            echo "" >> /tmp/comment.md
            echo "| 版本类型 | 模板 |" >> /tmp/comment.md
            echo "|---------|------|" >> /tmp/comment.md
            echo "| MINOR | \`## What's New\` → \`### New Models\` / \`### New Views\` |" >> /tmp/comment.md
            echo "| PATCH | \`## Bug Fixes\` |" >> /tmp/comment.md
            echo "| MAJOR | \`## Breaking Changes\` → \`## Migration Guide\` |" >> /tmp/comment.md
          fi

          echo "" >> /tmp/comment.md
          echo "> 由 GitHub Actions 自动生成" >> /tmp/comment.md

          # 查找是否已有评论（避免重复）
          EXISTING_COMMENT_ID=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("模型 & 视图变更总结"))) | .id' \
            | head -1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${EXISTING_COMMENT_ID}" \
              --method PATCH \
              --field body=@/tmp/comment.md
            echo "Updated existing comment #${EXISTING_COMMENT_ID}"
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --method POST \
              --field body=@/tmp/comment.md
            echo "Created new comment"
          fi

          # 打版本影响 label（容错：label 不存在则先创建，所有操作失败不阻塞）
          if [ -n "$VERSION_LABEL" ]; then
            # 确保 label 存在，不存在则创建
            LABEL_COLORS="major-change:d73a4a minor-change:fbca04 patch-change:0e8a16"
            for PAIR in $LABEL_COLORS; do
              L_NAME="${PAIR%%:*}"
              L_COLOR="${PAIR##*:}"
              gh api "repos/${GITHUB_REPOSITORY}/labels" \
                --method POST \
                -f name="$L_NAME" \
                -f color="$L_COLOR" 2>/dev/null || true
            done

            # 移除旧的版本 label
            for OLD_LABEL in major-change minor-change patch-change; do
              if [ "$OLD_LABEL" != "$VERSION_LABEL" ]; then
                gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/labels/${OLD_LABEL}" \
                  --method DELETE 2>/dev/null || true
              fi
            done

            # 添加新 label
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/labels" \
              --method POST \
              --jq '.[] | .name' \
              -f "labels[]=${VERSION_LABEL}" 2>/dev/null || true
          fi
